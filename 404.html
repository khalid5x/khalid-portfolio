<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Cairo', Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 500px; }
        .error-code {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #e94560, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 { font-size: 28px; margin-bottom: 12px; font-weight: 700; }
        p { font-size: 16px; color: #a0a0b0; margin-bottom: 32px; line-height: 1.6; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #e94560;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.3s, transform 0.2s;
        }
        .btn:hover { background: #d63a52; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
